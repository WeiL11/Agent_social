services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: persona
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d persona"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      ENVIRONMENT: dev
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/persona
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      LLM_PROVIDER: none
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
